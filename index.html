<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/otpauth/9.2.2/otpauth.umd.min.js"></script>
  
  <style>
    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --text: #171717;
      --text-muted: #737373;
      --border: #e5e5e5;
      --primary: #3b82f6;
      --card-shadow: 0 1px 2px rgba(0,0,0,0.05);
      
      /* Light Mode Pastel Colors */
      --day-bg: #fefce8; 
      --day-text: #a16207;
      --night-bg: #f0f9ff; 
      --night-text: #0369a1;
      
      --hover-bracket: rgba(23, 23, 23, 0.08);
      --hover-bracket-border: #171717;
      --current-time: rgba(239, 68, 68, 0.08); 
      --current-time-border: #ef4444; 
    }

    body.dark {
      --bg: #0a0a0a;
      --surface: #121212;
      --text: #ededed;
      --text-muted: #888888;
      --border: #262626;
      --card-shadow: none;

      /* Dark Mode Muted/Aesthetic Colors */
      --day-bg: #22221e;
      --day-text: #d4d4aa;
      --night-bg: #141a21;
      --night-text: #a6c4d6;
      
      --hover-bracket: rgba(237, 237, 237, 0.08);
      --hover-bracket-border: #ededed;
      --current-time: rgba(251, 113, 133, 0.08);
      --current-time-border: #fb7185;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

    body {
      background-color: var(--bg); color: var(--text);
      transition: background-color 0.2s, color 0.2s;
      padding: 1.5rem; max-width: 1200px; margin: 0 auto;
    }

    /* Header */
    header { display: flex; justify-content: flex-end; align-items: center; margin-bottom: 1.5rem; gap: 0.5rem; }
    
    .icon-btn {
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: 0.2s;
    }
    .icon-btn:hover { background: var(--border); }
    .lang-btn { padding: 0 0.75rem; width: auto; font-weight: 500; font-size: 0.8rem; }

    h2 { font-size: 0.85rem; font-weight: 600; margin-bottom: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

    /* Ultra-Compact OTP Grid */
    .otp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 0.75rem; margin-bottom: 2.5rem; }

    .otp-card {
      background: var(--surface); border-radius: 8px; padding: 0.75rem;
      box-shadow: var(--card-shadow); border: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      cursor: pointer; transition: transform 0.1s, border-color 0.2s;
    }
    .otp-card:hover { border-color: var(--text-muted); }
    .otp-card:active { transform: scale(0.97); }

    .company-name { font-size: 0.65rem; color: var(--text-muted); margin-bottom: 0.15rem; font-weight: 500; }
    .otp-code { font-size: 1.15rem; font-weight: 700; letter-spacing: 1px; }

    /* Tiny SVG Ticker */
    .countdown-wrapper { position: relative; width: 20px; height: 20px; flex-shrink: 0; }
    .countdown-svg { transform: rotate(-90deg); width: 100%; height: 100%; }
    .countdown-bg { fill: none; stroke: var(--border); stroke-width: 4; }
    .countdown-progress { fill: none; stroke: var(--primary); stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
    
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .danger-blink { stroke: var(--current-time-border) !important; animation: blink 1s infinite; }

    /* Toast */
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px);
      background: var(--text); color: var(--bg); padding: 0.5rem 1rem;
      border-radius: 20px; font-weight: 500; font-size: 0.8rem; opacity: 0;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* Timezone Grid */
    .tz-container {
      background: var(--surface); border-radius: 10px; box-shadow: var(--card-shadow);
      border: 1px solid var(--border); overflow-x: auto; position: relative;
    }

    .tz-scroll-wrapper { position: relative; min-width: max-content; display: flex; flex-direction: column; }
    .tz-row { display: flex; align-items: stretch; margin: 0; border-bottom: 1px solid var(--border); }
    .tz-row:last-child { border-bottom: none; }

    /* Strict Label Box Sizing */
    .tz-label-box {
      flex: 0 0 240px; width: 240px; padding: 0.75rem 1rem;
      position: sticky; left: 0; background: var(--surface); z-index: 20;
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column; justify-content: center;
    }
    
    .tz-card-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      margin-bottom: 2px; width: 100%;
    }
    
    .tz-utc { background: var(--border); color: var(--text); font-size: 0.65rem; padding: 3px 6px; border-radius: 4px; font-weight: 600; margin-left: auto; }
    .tz-city { font-weight: 600; font-size: 0.9rem; color: var(--text); }
    .tz-full-name { font-size: 0.65rem; color: var(--text-muted); font-weight: 500; }

    .tz-hours { display: flex; }

    .tz-cell {
      width: 55px; display: flex; flex-direction: column; justify-content: center; align-items: center;
      font-size: 0.65rem; font-weight: 600; cursor: default; padding: 0.75rem 0;
      position: relative; z-index: 5;
    }

    .day-cell { background-color: var(--day-bg); color: var(--day-text); }
    .night-cell { background-color: var(--night-bg); color: var(--night-text); }

    /* Full Box Absolute Brackets - Inset by 1px so they don't get clipped by the container */
    .bracket {
      position: absolute; top: 1px; bottom: 1px; width: 55px;
      pointer-events: none; z-index: 10; display: none;
      border-radius: 6px; box-sizing: border-box;
    }
    .hover-bracket {
      background: var(--hover-bracket);
      border: 2px solid var(--hover-bracket-border);
    }
    .current-bracket {
      background: var(--current-time);
      border: 2px solid var(--current-time-border);
      display: block; 
    }
  </style>
</head>
<body>

  <header>
    <button class="icon-btn lang-btn" onclick="toggleLang()" id="langBtn">EN / 中文</button>
    <button class="icon-btn" onclick="toggleTheme()" id="themeBtn">
      <svg id="themeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
      </svg>
    </button>
  </header>

  <div id="toast" class="toast">Copied to clipboard</div>

  <main>
    <h2 id="otp-title">Authenticators</h2>
    <section class="otp-grid" id="otp-grid"></section>

    <h2 id="tz-title">World Time</h2>
    <section class="tz-container" id="tz-container"></section>
  </main>

  <script>
    let timeOffsetMs = 0;
    let currentLang = 'en';
    
    const dict = {
      en: { otpTitle: "Authenticators", tzTitle: "World Time", copied: "Copied!" },
      zh: { otpTitle: "身份验证器", tzTitle: "世界时间", copied: "已复制!" }
    };

    const sunIcon = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:2px"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>`;
    const moonIcon = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:2px"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>`;

    async function syncTime() {
      try {
        const res = await fetch('https://worldtimeapi.org/api/timezone/Etc/UTC');
        const data = await res.json();
        timeOffsetMs = (data.unixtime * 1000) - Date.now();
      } catch (e) { console.log("Sync failed."); }
      setInterval(updateOTPs, 1000); updateOTPs();
    }

    function toggleTheme() {
      document.body.classList.toggle('dark');
      const icon = document.getElementById('themeIcon');
      if (document.body.classList.contains('dark')) {
        icon.innerHTML = `<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>`;
      } else {
        icon.innerHTML = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>`;
      }
    }

    function toggleLang() {
      currentLang = currentLang === 'en' ? 'zh' : 'en';
      document.getElementById('otp-title').innerText = dict[currentLang].otpTitle;
      document.getElementById('tz-title').innerText = dict[currentLang].tzTitle;
      renderTimezones(); 
    }

    let toastTimeout;
    function showToast() {
      const toast = document.getElementById('toast');
      toast.innerText = dict[currentLang].copied;
      toast.classList.add('show');
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => toast.classList.remove('show'), 2000);
    }

    const companies = [
      { name: "StructuredData", secret: "DYZH4DXG46JGW2K4" },
      { name: "空UDDSteady", secret: "DYZH4DXG46JGW2K4" },
      { name: "空空UDDSteady", secret: "DYZH4DXG46JGW2K4" },
      { name: "空UDDSteady", secret: "DYZH4DXG46JGW2K4" },
      { name: "空UDDSteady", secret: "DYZH4DXG46JGW2K4" },
      { name: "空UDDSteady", secret: "DYZH4DXG46JGW2K4" }
    ];

    const radius = 10;
    const circumference = 2 * Math.PI * radius;

    function renderOTPCards() {
      const grid = document.getElementById('otp-grid');
      grid.innerHTML = companies.map((comp, idx) => `
        <div class="otp-card" onclick="copyOTP('otp-${idx}')">
          <div>
            <div class="company-name">${comp.name}</div>
            <div class="otp-code" id="otp-${idx}">000 000</div>
          </div>
          <div class="countdown-wrapper">
            <svg class="countdown-svg" viewBox="0 0 24 24">
              <circle class="countdown-bg" cx="12" cy="12" r="10"></circle>
              <circle class="countdown-progress" id="circle-${idx}" cx="12" cy="12" r="10" 
                stroke-dasharray="${circumference}" stroke-dashoffset="0"></circle>
            </svg>
          </div>
        </div>
      `).join('');
    }

    function updateOTPs() {
      const trueNow = Date.now() + timeOffsetMs;
      const epochSeconds = Math.floor(trueNow / 1000);
      const secondsLeft = 30 - (epochSeconds % 30);
      const dashoffset = circumference - (secondsLeft / 30) * circumference;

      companies.forEach((comp, idx) => {
        let totp = new OTPAuth.TOTP({
          issuer: comp.name, label: "Portal", algorithm: "SHA1", digits: 6, period: 30,
          secret: OTPAuth.Secret.fromBase32(comp.secret.replace(/\s+/g, '')),
        });
        
        let code = totp.generate({ timestamp: trueNow });
        document.getElementById(`otp-${idx}`).innerText = code.substring(0,3) + " " + code.substring(3,6);
        
        const circle = document.getElementById(`circle-${idx}`);
        circle.style.strokeDashoffset = dashoffset;
        
        if (secondsLeft <= 5) circle.classList.add('danger-blink');
        else circle.classList.remove('danger-blink');
      });
    }

    const tzs = [
      { city: { en: "Kuala Lumpur, MY", zh: "吉隆坡, 马来西亚" }, name: { en: "Malaysia Time", zh: "马来西亚时间" }, abbr: "MYT", id: "Asia/Kuala_Lumpur" },
      { city: { en: "St. John's, CA", zh: "圣约翰斯, 加拿大" }, name: { en: "Newfoundland Time", zh: "纽芬兰时间" }, abbr: "NT", id: "America/St_Johns" },
      { city: { en: "Halifax, CA", zh: "哈利法克斯, 加拿大" }, name: { en: "Atlantic Time", zh: "大西洋时间" }, abbr: "AT", id: "America/Halifax" },
      { city: { en: "New York, US", zh: "纽约, 美国" }, name: { en: "Eastern Time", zh: "东部时间" }, abbr: "ET", id: "America/New_York" },
      { city: { en: "Chicago, US", zh: "芝加哥, 美国" }, name: { en: "Central Time", zh: "中部时间" }, abbr: "CT", id: "America/Chicago" },
      { city: { en: "Denver, US", zh: "丹佛, 美国" }, name: { en: "Mountain Time", zh: "山地时间" }, abbr: "MT", id: "America/Denver" },
      { city: { en: "Los Angeles, US", zh: "洛杉矶, 美国" }, name: { en: "Pacific Time", zh: "太平洋时间" }, abbr: "PT", id: "America/Los_Angeles" },
      { city: { en: "Anchorage, US", zh: "安克雷奇, 美国" }, name: { en: "Alaska Time", zh: "阿拉斯加时间" }, abbr: "AKT", id: "America/Anchorage" },
      { city: { en: "Honolulu, US", zh: "檀香山, 美国" }, name: { en: "Hawaii Time", zh: "夏威夷时间" }, abbr: "HT", id: "Pacific/Honolulu" }
    ];

    function getUTCOffset(timeZone, date) {
      const parts = new Intl.DateTimeFormat('en-US', { timeZone, timeZoneName: 'shortOffset' }).formatToParts(date);
      const offset = parts.find(p => p.type === 'timeZoneName').value;
      return offset === 'GMT' ? 'UTC+0' : offset.replace('GMT', 'UTC');
    }

    function renderTimezones() {
      const container = document.getElementById('tz-container');
      const baseTime = new Date(Date.now() + timeOffsetMs);
      baseTime.setMinutes(0, 0, 0); 

      let html = `<div class="tz-scroll-wrapper" id="tz-scroll-wrapper">`;
      
      tzs.forEach((tz) => {
        const offsetBadge = getUTCOffset(tz.id, baseTime);
        let cellsHtml = '';

        for (let i = -4; i < 20; i++) {
          const futureTime = new Date(baseTime.getTime() + (i * 3600000));
          const hr24 = parseInt(new Intl.DateTimeFormat('en-US', { timeZone: tz.id, hour: 'numeric', hour12: false }).format(futureTime));
          const isDay = hr24 >= 6 && hr24 < 18;
          
          let display = new Intl.DateTimeFormat('en-US', { timeZone: tz.id, hour: 'numeric', hour12: true }).format(futureTime);
          display = display.replace(' AM', 'am').replace(' PM', 'pm'); 

          const bgClass = isDay ? 'day-cell' : 'night-cell';
          const icon = isDay ? sunIcon : moonIcon;

          cellsHtml += `
            <div class="tz-cell ${bgClass}" data-col="${i}">
              ${icon}
              <span>${display}</span>
            </div>
          `;
        }

        html += `<div class="tz-row">
          <div class="tz-label-box">
            <div class="tz-card-header">
                <span class="tz-city">${tz.city[currentLang]}</span>
                <span class="tz-utc">${offsetBadge}</span>
            </div>
            <div class="tz-full-name">${tz.name[currentLang]} • ${tz.abbr}</div>
          </div>
          <div class="tz-hours">${cellsHtml}</div>
        </div>`;
      });
      
      html += `
        <div id="hover-bracket" class="bracket hover-bracket"></div>
        <div id="current-bracket" class="bracket current-bracket"></div>
      </div>`;
      
      container.innerHTML = html;
      initBrackets();
    }

    function initBrackets() {
      const hoverBracket = document.getElementById('hover-bracket');
      const currentBracket = document.getElementById('current-bracket');
      const cells = document.querySelectorAll('.tz-cell');
      const labelWidth = 240; 
      
      cells.forEach(cell => {
        const colIndex = parseInt(cell.getAttribute('data-col')) + 4;
        const leftPos = labelWidth + (colIndex * 55);

        cell.addEventListener('mouseenter', () => {
          hoverBracket.style.display = 'block';
          hoverBracket.style.left = leftPos + 'px';
        });
        
        cell.parentElement.addEventListener('mouseleave', () => {
          hoverBracket.style.display = 'none';
        });

        if(cell.getAttribute('data-col') === "0") {
          currentBracket.style.left = leftPos + 'px';
        }
      });
    }

    function copyOTP(id) {
      const text = document.getElementById(id).innerText.replace(" ", "");
      navigator.clipboard.writeText(text).then(showToast).catch(() => {
        const temp = document.createElement("input");
        document.body.appendChild(temp);
        temp.value = text; temp.select(); document.execCommand("copy");
        document.body.removeChild(temp);
        showToast();
      });
    }

    renderOTPCards(); renderTimezones(); syncTime(); 
  </script>
</body>
</html>
